<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> 
    <title>Document</title>
</head>
<body>
    <div class="caixa">
    <h2>Formulário de Adoção</h2>

    <form id="fformAdocao">
        <label for="nome">nome</label>
        <input type="text" id="nome" placeholder="Digite seu nome" minlength="3">
        <br>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Digite seu email">
        <br>
         <label for="telefone">Telefone</label>
        <input type="telefone" id="telefone" placeholder="Digite seu telefone" minlength="8">
        <br>
         <label for="idade">Idade</label>
        <input type="idade" id="idade" placeholder="Digite seu idade" minlength="18">
        <br>
        <label for="moradia">Moradia</label>
        <select name="moradia" id="moradia">
            <option value="">Selecione</option>
            <br>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option> 
        </select>
        <br>
        <label for="quintal">Possui Quintal?</label>
        <br>
        <input type="radio" name="quintal" value="sim">Sim
        <input type="radio" name="quintal" value="nao">Não 
        <br>
        <button type="submit">Enviar</button>
    </form>
    <div id="resultado"></div>
    <script src="scripts/scripts.js"></script>
    </div>
</body>
</html>
